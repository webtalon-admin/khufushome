# KhufusHome environment configuration.
# Non-secret, environment-specific values — committed to the repo.
# Switch environments with KHUFUS_ENV=local or KHUFUS_ENV=prod.
# Secrets live in .env.local (gitignored) — see .env.example.

local:
  supabase:
    url: "http://127.0.0.1:54321"
    auth_cookie_domain: "localhost"
  home_assistant:
    url: "http://localhost:8123"
    websocket_url: "ws://localhost:8123/api/websocket"
  mqtt:
    host: "localhost"
    port: 1883
  apps:
    dashboard_url: "http://localhost:5173"
    threedimension_url: "http://localhost:5174"
    finance_url: "http://localhost:5175"
  features:
    mock_devices: true
    seed_data: true

prod:
  supabase:
    url: "https://qlujrhazvdukqsdupuuf.supabase.co"
    auth_cookie_domain: ".khufushome.com"
  home_assistant:
    url: "https://ha.khufushome.com"
    websocket_url: "wss://ha.khufushome.com/api/websocket"
  mqtt:
    host: "mosquitto" # UmbrelOS Docker network hostname
    port: 1883
  apps:
    dashboard_url: "https://khufushome.com"
    threedimension_url: "https://threedimension.khufushome.com"
    finance_url: "https://finance.khufushome.com"
  features:
    mock_devices: false
    seed_data: false
